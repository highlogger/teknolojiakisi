services:
  # Next.js Uygulamasi
  app:
    build:
      context: .
      args:
        - AUTH_SECRET=${AUTH_SECRET}
        - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    image: teknolojiakisi:latest
    container_name: teknolojiakisi-app
    restart: unless-stopped
    ports:
      - "3000"
    volumes:
      - app_data:/data
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=file:/data/dev.db
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=${AUTH_URL:-https://teknolojiakisi.com.tr}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=https://api.deepseek.com/v1
      - NEXT_PUBLIC_SITE_URL=${SITE_URL:-https://teknolojiakisi.com.tr}
      - NEXT_PUBLIC_SITE_NAME=TeknolojiAkisi
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "node", "-e", "var h=require('http');h.get('http://localhost:3000/',function(r){process.exit(r.statusCode==200?0:1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Haber Botu (aynı image, farklı komut)
  bot:
    image: teknolojiakisi:latest
    container_name: teknolojiakisi-bot
    restart: unless-stopped
    command: ["node", "auto-bot.js"]
    volumes:
      - app_data:/data
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/dev.db
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=https://api.deepseek.com/v1
    networks:
      - app_network
    depends_on:
      app:
        condition: service_healthy

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: teknolojiakisi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - app_network
    depends_on:
      - app

volumes:
  app_data:
  nginx_cache:

networks:
  app_network:
    driver: bridge
